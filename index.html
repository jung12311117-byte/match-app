<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Match Scheduler</title>
<link rel="manifest" href="manifest.json">
<style>
body { font-family: sans-serif; padding:15px; }
textarea { width:100%; height:120px; }
button { padding:10px; margin:5px 0; width:100%; font-size:16px; }
select { width:100%; padding:8px; }
.match { border:1px solid #ccc; padding:8px; margin:8px 0; }
.round-title { font-weight:bold; margin-top:15px; }
input.small { width:60px; }
</style>
</head>
<body>

<h2>對戰排程系統</h2>

<textarea id="players" placeholder="每行一個人名"></textarea>

<select id="courts">
<option value="1">1 場地</option>
<option value="2">2 場地</option>
<option value="3">3 場地</option>
</select>

<button onclick="generate()">產生 20 輪</button>
<button onclick="resetAll()">重置</button>

<hr>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
